name: Furtemp
options:
  bundleIdPrefix: com.shimondeitel.pettemp
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Furtemp:
    type: application
    platform: iOS
    sources:
      - path: Furtemp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.pettemp
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Furtemp/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FurtempTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FurtempTests
      - path: Furtemp.storekit
    dependencies:
      - target: Furtemp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.pettemp.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FurtempUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FurtempUITests
    dependencies:
      - target: Furtemp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.pettemp.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Furtemp:
    build:
      targets:
        Furtemp: all
        FurtempTests: [test]
        FurtempUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Furtemp.storekit
    test:
      config: Debug
      storeKitConfiguration: Furtemp.storekit
      targets:
        - FurtempTests
        - FurtempUITests
    archive:
      config: Release
